<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeff Duartê</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:ital,wght@0,300;0,400;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="assets/img/icon/favicon.svg" type="image/svg+xml">
<link rel="icon" href="assets/img/icon/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="assets/img/icon/favicon-180.png">
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-left">
    <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="dropdown" id="dropdown">
      <a href="#home">Portfolio</a>
      <a href="contact.html#biography">Biography</a>
      <a href="contact.html#contact">Contact</a>
    </div>
  </div>
  <a href="#home" class="nav-logo">Jeff Duartê</a>
</nav>

<!-- HERO -->
<section class="hero" id="home">
  <div class="hero-inner">
    <h1 class="hero-name">Jeff Duartê</h1>
    <p class="hero-sub">Beauty Artist · Makeup · Hair · Digital Creators</p>
  </div>
</section>

<!-- PORTFOLIO -->
<section class="portfolio">

  <div class="portfolio-header">
    <span class="portfolio-title">
      Portfolio
      <svg viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 1L5 5L9 1" stroke="#111111" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </span>
  </div>

  <div class="portfolio-content" id="portfolioContent">

    <!-- Editorial-makeup -->
    <div class="cat-block">
      <div class="cat-label">
        <a href="category.html#editorial-makeup"><span>Editorial Makeup</span></a>
      </div>
      <a href="category.html#editorial-makeup" class="img-link">
        <div class="grid-single">
          <img src="assets/img/Editorial-makeup/Editorial-makeup-12.webp" alt="Editorial-makeup">
        </div>
      </a>
    </div>

    <!-- Editorial-fashion -->
    <div class="cat-block">
      <div class="cat-label">
        <a href="category.html#editorial-fashion"><span>Editorial Fashion</span></a>
      </div>
      <a href="category.html#editorial-fashion" class="img-link">
        <div class="grid-two">
          <img src="assets/img/Editorial-fashion/Editorial-fashion-25.webp" alt="Editorial-fashion 1">
          <img src="assets/img/Editorial-fashion/Editorial-fashion-26.webp" alt="Editorial-fashion 2">
        </div>
      </a>
    </div>

    <!-- Beauty-portraits -->
    <div class="cat-block">
      <div class="cat-label">
        <a href="category.html#beauty-portraits"><span>Beauty Portraits</span></a>
      </div>
      <a href="category.html#beauty-portraits" class="img-link">
        <div class="grid-single">
          <img src="assets/img/Beauty-portraits/Beauty-portraits-3.webp" alt="Beauty-portraits">
        </div>
      </a>
    </div>

    <!-- Advertising -->
    <div class="cat-block">
      <div class="cat-label">
        <a href="category.html#advertising"><span>Advertising</span></a>
      </div>
      <a href="category.html#advertising" class="img-link">
        <div class="grid-two">
          <img src="assets/img/Advertising/Advertising-1.webp" alt="Advertising 1">
          <img src="assets/img/Advertising/Advertising-10.webp" alt="Advertising 2">
        </div>
      </a>
    </div>

  </div><!-- end portfolio-content -->

  <!-- About the artist -->
  <div class="about-btn-wrap">
    <a href="contact.html#biography" class="about-btn">About the artist</a>
  </div>

</section>

<!-- FOOTER BAR -->
<footer class="footer-bar">
</footer>

<script src="main.js"></script>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
</body>
</html>
